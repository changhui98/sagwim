name: SAGWIM CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ===================================================
  # 백엔드 CI
  # ===================================================
  backend-ci:
    name: 백엔드 빌드 & 테스트
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: sagwim_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Java 25 설정
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('com.peopleground.sagwim.be/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 백엔드 빌드 및 테스트
        working-directory: com.peopleground.sagwim.be
        env:
          POSTGRES_DB: sagwim_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-secret-key-for-ci-at-least-32-chars
          GOOGLE_MAPS_API_KEY: test-key
          MAIL_USERNAME: test@example.com
          MAIL_PASSWORD: test-password
          KAKAO_CLIENT_ID: test
          KAKAO_CLIENT_SECRET: test
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test
        run: ./gradlew build --no-daemon

      - name: 백엔드 빌드 산출물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: com.peopleground.sagwim.be/build/libs/*.jar
          retention-days: 1

  # ===================================================
  # 프론트엔드 CI
  # ===================================================
  frontend-ci:
    name: 프론트엔드 빌드
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 22 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: com.peopleground.sagwim.fe/package-lock.json

      - name: 의존성 설치
        working-directory: com.peopleground.sagwim.fe
        run: npm ci

      - name: 타입 검사 및 빌드
        working-directory: com.peopleground.sagwim.fe
        run: npm run build

  # ===================================================
  # 운영 배포 (main 브랜치 push 시에만)
  # ===================================================
  deploy:
    name: 운영 배포
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: 배포 태그 설정
        id: tag
        run: |
          TAG="$(date +%Y%m%d)-${GITHUB_SHA::7}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "배포 태그: $TAG"

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: 백엔드 이미지 빌드 및 저장
        uses: docker/build-push-action@v5
        with:
          context: com.peopleground.sagwim.be
          push: false
          tags: |
            sagwim-backend:${{ steps.tag.outputs.tag }}
            sagwim-backend:latest
          outputs: type=docker,dest=/tmp/sagwim-backend.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 프론트엔드 이미지 빌드 및 저장
        uses: docker/build-push-action@v5
        with:
          context: com.peopleground.sagwim.fe
          push: false
          tags: |
            sagwim-frontend:${{ steps.tag.outputs.tag }}
            sagwim-frontend:latest
          outputs: type=docker,dest=/tmp/sagwim-frontend.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 이미지 파일 홈서버로 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOME_SERVER_HOST }}
          username: ${{ secrets.HOME_SERVER_USER }}
          key: ${{ secrets.HOME_SERVER_SSH_KEY }}
          port: ${{ secrets.HOME_SERVER_PORT || '22' }}
          source: "/tmp/sagwim-backend.tar,/tmp/sagwim-frontend.tar"
          target: "~/sagwim/images"
          strip_components: 2

      - name: 배포 스크립트 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOME_SERVER_HOST }}
          username: ${{ secrets.HOME_SERVER_USER }}
          key: ${{ secrets.HOME_SERVER_SSH_KEY }}
          port: ${{ secrets.HOME_SERVER_PORT || '22' }}
          source: "scripts/"
          target: "~/sagwim/"

      - name: 홈서버에서 Blue-Green 배포 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOME_SERVER_HOST }}
          username: ${{ secrets.HOME_SERVER_USER }}
          key: ${{ secrets.HOME_SERVER_SSH_KEY }}
          port: ${{ secrets.HOME_SERVER_PORT || '22' }}
          script: |
            set -e
            TAG="${{ steps.tag.outputs.tag }}"

            echo "=== 이미지 로드 ==="
            docker load -i ~/sagwim/images/sagwim-backend.tar
            docker load -i ~/sagwim/images/sagwim-frontend.tar

            echo "=== 배포 실행 ==="
            cd ~/sagwim
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh all "$TAG"

            echo "=== 이미지 파일 정리 ==="
            rm -f ~/sagwim/images/sagwim-*.tar
