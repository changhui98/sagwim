# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit 설정 파일 (com.peopleground.sagwim.be)
# ------------------------------------------------------------
# - 공식 스키마: https://coderabbit.ai/integrations/schema.v2.json
# - 공식 문서  : https://docs.coderabbit.ai/getting-started/configure-coderabbit
#
# 아래 값들은 전부 "기본값"이며, 우리 프로젝트에서 바꾼 항목은 language 뿐입니다.
# 필요 시 원하는 항목만 골라서 값을 수정하면 됩니다.
# (주석은 한글, 키/값은 영문 스키마 그대로)
# ------------------------------------------------------------

# 리뷰/채팅에 사용할 언어 (ISO 언어 코드)
# - 기본값: en-US
# - 한국어: ko-KR (또는 ko)
# - 지원 언어: de, en, ja, zh, fr, es, ... (스키마의 enum 참고)
language: "ko"

# 리뷰 톤을 자유 텍스트로 지시 (최대 250자)
# - 기본값: ""  (비워두면 기본 톤)
# - 예시: "간결하고 실무 개발자 관점으로, 존댓말을 사용해 설명해 주세요."
tone_instructions: "간결하고 실무 개발자 관점으로, 존댓말을 사용해 설명해 주세요."

# Early Access(얼리 억세스) 기능 사용 여부
# - 기본값: false
# - true: 실험 기능(아직 베타인 신기능)을 먼저 체험
early_access: false

# 유료 플랜이 아닐 때 Free tier 기능을 활성화할지 여부
# - 기본값: true
enable_free_tier: true

# 상위(조직/계정) 설정을 상속할지 여부
# - 기본값: false
# - true로 두면 여기에 없는 값은 조직 설정을 따름
inheritance: false


# ============================================================
# reviews: PR 리뷰 동작 관련 설정
# ============================================================
reviews:
  # 리뷰 프로필 (리뷰 강도)
  # - "chill"     : 가볍게 리뷰 (기본값)
  # - "assertive" : 깐깐하게, nitpicky 피드백 포함
  profile: "chill"

  # CodeRabbit 코멘트가 전부 해결되고, pre-merge 체크가 모두 통과하면 자동 approve
  # - 기본값: false
  # - GitLab의 경우 모든 discussion이 resolved 되어야 함
  request_changes_workflow: false

  # PR 설명(또는 walkthrough)에 하이레벨 요약을 자동 생성
  # - 기본값: true
  high_level_summary: true

  # 하이레벨 요약에 대한 추가 지시
  # - 기본값: ""
  # - 예시: "릴리즈 노트 형식의 bullet list로 간결하게 작성"
  high_level_summary_instructions: ""

  # PR 본문에 이 placeholder가 있으면 요약 텍스트로 치환됨
  # - 기본값: "@coderabbitai summary"
  high_level_summary_placeholder: "@coderabbitai summary"

  # 하이레벨 요약을 PR description이 아니라 walkthrough 코멘트에 넣을지
  # - 기본값: false
  high_level_summary_in_walkthrough: false

  # PR 제목에 이 키워드가 들어 있으면 자동으로 제목을 생성
  # - 기본값: "@coderabbitai"
  auto_title_placeholder: "@coderabbitai"

  # 자동 제목 생성 커스터마이즈 지시
  # - 기본값: ""
  # - 예시: "Conventional Commits 규칙(feat:, fix: 등)을 따르도록 작성"
  auto_title_instructions: ""

  # walkthrough 코멘트에 리뷰 상태(스킵된 이유 등)를 게시
  # - 기본값: true
  review_status: true

  # 리뷰 세부 사항(무시된 파일, 추가 컨텍스트, 숨긴 코멘트 등) 게시
  # - 기본값: false
  review_details: false

  # 리뷰 진행 중에 commit status를 "pending" → "success"로 갱신
  # - 기본값: true
  commit_status: true

  # 리뷰 불가(에러) 상황일 때 commit status를 "failure"로 설정
  # - 기본값: false
  fail_commit_status: false

  # walkthrough 섹션을 마크다운 collapsible(접는 형태)로 표시
  # - 기본값: true
  collapse_walkthrough: true

  # walkthrough에 변경된 파일 요약 포함
  # - 기본값: true
  changed_files_summary: true

  # walkthrough에 시퀀스 다이어그램 포함
  # - 기본값: true
  sequence_diagrams: false

  # walkthrough에 예상 리뷰 난이도 포함
  # - 기본값: true
  estimate_code_review_effort: true

  # 연결된 이슈를 얼마나 잘 해결했는지 평가 포함
  # - 기본값: true
  assess_linked_issues: true

  # 잠재적으로 관련된 이슈 목록을 walkthrough에 포함
  # - 기본값: true
  related_issues: true

  # 잠재적으로 관련된 PR 목록을 walkthrough에 포함
  # - 기본값: true
  related_prs: true

  # 변경 내용을 기반으로 라벨 추천
  # - 기본값: true
  suggested_labels: true

  # 라벨 추천 규칙 (labels를 명시하면 이 목록 안에서만 추천)
  # - 기본값: []
  # - 예시:
  #   labeling_instructions:
  #     - label: "backend"
  #       instructions: "src/main/java 이하가 변경되었을 때 적용"
  labeling_instructions: []

  # 추천된 라벨을 PR에 자동으로 적용
  # - 기본값: false
  auto_apply_labels: false

  # 리뷰어 추천
  # - 기본값: true
  suggested_reviewers: true

  # 추천 리뷰어를 PR에 자동 지정 (GitHub only)
  # - 기본값: false
  auto_assign_reviewers: false

  # 특정 시나리오별로 리뷰어를 지정하는 규칙 (GitHub only)
  # - 기본값: []
  # - 예시:
  #   suggested_reviewers_instructions:
  #     - reviewers:
  #         - handle: "backend-team"
  #           type: "group"
  #       instructions: "src/main/java 하위가 변경되었을 때 지정"
  suggested_reviewers_instructions: []

  # 리뷰 진행 중에 포춘(재미용 메시지) 코멘트 게시
  # - 기본값: true
  in_progress_fortune: true

  # walkthrough 코멘트에 시(poem) 생성
  # - 기본값: true
  poem: true

  # inline 리뷰 코멘트에 "🤖 Prompt for AI Agents" 섹션을 포함해
  # AI 에이전트(Cursor/Copilot 등)가 수정할 수 있는 프롬프트 제공
  # - 기본값: true
  enable_prompt_for_ai_agents: true

  # 리뷰에 포함/제외할 파일 glob 패턴
  # - 기본값: []
  # - 예시: ["!build/**", "!**/*.min.js", "src/**"]
  path_filters: []

  # 경로별 커스텀 리뷰 지시 (해당 경로의 파일 리뷰 시 추가 지시)
  # - 기본값: []
  # - 예시:
  #   path_instructions:
  #     - path: "src/main/java/**/*.java"
  #       instructions: "Spring Boot 관례(@Transactional, DI 등)를 기준으로 리뷰"
  path_instructions: []

  # PR이 닫히거나 merge되면 진행 중인 리뷰를 중단
  # - 기본값: true
  abort_on_close: true

  # 코드/의존성 캐시를 끄고 매번 새로 가져오기
  # - 기본값: false
  disable_cache: false

  # Slop(저품질 PR) 감지 설정 (GitHub public repo 전용)
  slop_detection:
    # - 기본값: true
    enabled: true
    # slop으로 분류될 때 붙일 라벨 이름 (미지정 시 적용 안 함)
    # label: "slop"

  # 자동 리뷰 설정
  auto_review:
    # PR이 올라오면 자동으로 리뷰 수행
    # - 기본값: true
    enabled: true

    # auto review가 꺼져 있어도 PR 설명에 이 키워드가 있으면 리뷰 수행
    # - 기본값: ""
    description_keyword: ""

    # 푸시할 때마다 증분 리뷰 재실행
    # - 기본값: true
    auto_incremental_review: true

    # 리뷰된 커밋이 N개 쌓이면 자동 리뷰 일시 중지 (0 = 끄기)
    # - 기본값: 5
    auto_pause_after_reviewed_commits: 5

    # PR 제목에 이 키워드가 있으면 리뷰 스킵 (대소문자 무시)
    # - 기본값: []
    # - 예시: ["[WIP]", "WIP:", "chore:"]
    ignore_title_keywords: []

    # 라벨로 리뷰 대상 제어 ('!' 접두어는 제외 조건)
    # - 기본값: []
    # - 예시: ["bug", "!wip"]  →  wip 제외하고 bug만 리뷰
    labels: []

    # 드래프트 PR도 리뷰할지
    # - 기본값: false
    drafts: false

    # default branch 외 추가로 리뷰할 base branch들 (정규식 허용)
    # - 기본값: []
    # - 예시: ["develop", "release/.*"]
    base_branches: []

    # 특정 사용자(봇 등)가 만든 PR은 리뷰 스킵
    # - 기본값: []
    # - 예시: ["dependabot[bot]", "renovate[bot]"]
    ignore_usernames: []

  # PR 후처리(Finishing Touches) 기능 설정
  finishing_touches:
    # 📝 Generate docstrings 체크박스 / `@coderabbitai generate docstrings` 로 동작
    docstrings:
      # - 기본값: true
      enabled: true

    # 변경 코드에 대한 유닛 테스트 자동 생성
    unit_tests:
      # - 기본값: true
      enabled: true

    # ✨ Simplify code 체크박스: 변경 코드의 재사용/품질/효율을 개선
    simplify:
      # - 기본값: false (지원되면 활성화 고려)
      enabled: false

    # 사용자 정의 recipe (최대 5개), `@coderabbitai run <name>` 로 실행
    # - 기본값: []
    # - 예시:
    #   custom:
    #     - name: "cleanup imports"
    #       instructions: "사용하지 않는 import를 제거하고 정렬해 주세요."
    #       enabled: true
    custom: []

  # Pre-merge 체크 (merge 전에 통과해야 하는 검사들)
  # mode 값은 모두 "off" | "warning" | "error" 중 선택
  #   - off     : 체크 비활성
  #   - warning : 경고만 남김 (기본값)
  #   - error   : request_changes_workflow 가 true 면 머지 블록 가능
  pre_merge_checks:
    # 실패한 pre-merge 체크를 override(무시) 할 수 있는 사람을
    # "요청된 리뷰어"로만 제한 (작성자는 override 불가)
    # - 기본값: false
    override_requested_reviewers_only: false

    # docstring 커버리지 체크
    docstrings:
      # - 기본값: "warning"
      mode: "warning"
      # 요구 커버리지(%) (0 ~ 100)
      # - 기본값: 80
      threshold: 80

    # PR 제목 요구사항 체크
    title:
      # - 기본값: "warning"
      mode: "warning"
      # 요구사항 설명 (비우면 일반 best practice 기준)
      # - 기본값: ""
      # - 예시: "Conventional Commits (feat:, fix:, chore: ...) 형식을 따를 것"
      requirements: ""

    # PR 설명(description) best practice 준수 체크
    description:
      # - 기본값: "warning"
      mode: "warning"

    # 연결된 이슈(linked issue) 해결도 평가
    issue_assessment:
      # - 기본값: "warning"
      mode: "warning"

    # 사용자 정의 pre-merge 체크 (최대 50개)
    # - 기본값: []
    # - 예시:
    #   custom_checks:
    #     - name: "No println"
    #       mode: "error"
    #       instructions: "System.out.println / printStackTrace 가 남아있으면 실패 처리"
    custom_checks: []

  # 리뷰 시 참고할 외부 정적 분석 도구들
  # 대부분 기본값 true (설치/실행 가능할 때만 동작).
  # Java(Gradle) 프로젝트에서 유용한 것만 위에 두고, 나머지는 필요 시 비활성화하세요.
  tools:
    # 추상 구문 트리 기반 패턴 매처 (다언어 지원)
    ast-grep:
      # 사용자 정의 룰 디렉토리 (기본값: [])
      rule_dirs: []
      # 공통 util 디렉토리 (기본값: [])
      util_dirs: []
      # ast-grep essentials 룰 번들 사용 여부 (기본값: true)
      essential_rules: true
      # 미리 정의된 패키지 (기본값: [])
      packages: []

    # Java 프로젝트에서 핵심적으로 유용 (정적 분석)
    pmd:
      # 기본값: true
      enabled: true
      # 사용자 PMD 설정 파일 경로 (기본 미지정)
      # config_file: "pmd-ruleset.xml"

    # Kotlin 린터 (Kotlin 파일 있을 때만 의미 있음)
    detekt:
      # 기본값: true
      enabled: true
      # 사용자 detekt 설정 파일 경로 (기본 미지정)
      # config_file: "detekt.yml"

    # 범용 정적 분석 (여러 언어 지원, 보안 중심 규칙 많음)
    semgrep:
      enabled: true  # 기본값: true
      # config_file: ".semgrep.yml"
    opengrep:
      enabled: true  # 기본값: true (semgrep 호환 대체 엔진)

    # 시크릿/키 유출 스캐너
    gitleaks:
      enabled: true  # 기본값: true (실제로는 Betterleaks)
    trufflehog:
      enabled: true  # 기본값: true

    # 취약점/IaC 스캐너
    trivy:
      enabled: true  # 기본값: true
    osvScanner:
      enabled: true  # 기본값: true
    checkov:
      enabled: true  # 기본값: true

    # 문서/YAML/MD 린터
    markdownlint:
      enabled: true  # 기본값: true
    yamllint:
      enabled: true  # 기본값: true
    languagetool:
      enabled: true             # 기본값: true
      level: "default"          # 기본값: "default" ("picky" 로 더 엄격)
      enabled_only: false       # 기본값: false
      enabled_rules: []         # 기본값: []
      disabled_rules: []        # 기본값: []
      enabled_categories: []    # 기본값: []
      disabled_categories: []   # 기본값: []

    # GitHub Actions 워크플로우 파일 체커
    actionlint:
      enabled: true  # 기본값: true

    # GitHub Checks(CI 상태)와 연동
    github-checks:
      enabled: true       # 기본값: true
      timeout_ms: 90000   # 기본값: 90000 (최대 900000 = 15분)

    # --- 다른 언어/도구 린터들 (기본 true, 필요 없으면 끄세요) ---
    shellcheck: { enabled: true }        # Shell
    ruff:       { enabled: true }        # Python
    flake8:     { enabled: true }        # Python
    pylint:     { enabled: true }        # Python
    biome:      { enabled: true }        # JS/TS 포맷터+린터
    eslint:     { enabled: true }        # JS/TS
    oxc:        { enabled: true }        # JS/TS (Oxlint)
    stylelint:  { enabled: true }        # CSS
    htmlhint:   { enabled: true }        # HTML
    hadolint:   { enabled: true }        # Dockerfile
    swiftlint:  { enabled: true }        # Swift
    rubocop:    { enabled: true }        # Ruby
    brakeman:   { enabled: true }        # Ruby on Rails 보안
    clippy:     { enabled: true }        # Rust
    clang:      { enabled: true }        # C/C++
    cppcheck:   { enabled: true }        # C/C++
    golangci-lint: { enabled: true }     # Go
    phpstan:    { enabled: true, level: "default" }  # PHP (level: default|0..9|max)
    phpmd:      { enabled: true }        # PHP
    phpcs:      { enabled: true }        # PHP
    buf:        { enabled: true }        # Protobuf
    regal:      { enabled: true }        # Rego(OPA)
    tflint:     { enabled: true }        # Terraform
    sqlfluff:   { enabled: true }        # SQL
    prismaLint: { enabled: true }        # Prisma
    circleci:   { enabled: true }        # CircleCI
    checkmake:  { enabled: true }        # Makefile
    luacheck:   { enabled: true }        # Lua
    dotenvLint: { enabled: true }        # .env
    fortitudeLint: { enabled: true }     # Fortran
    shopifyThemeCheck: { enabled: true } # Shopify
    smartyLint: { enabled: true }        # Smarty
    emberTemplateLint: { enabled: true } # Handlebars
    psscriptanalyzer:  { enabled: true } # PowerShell
    blinter:   { enabled: true }         # Windows batch


# ============================================================
# chat: PR 코멘트 채팅 관련 설정
# ============================================================
chat:
  # 채팅 응답에 ASCII/이모지 아트 사용
  # - 기본값: true
  art: true

  # 조직 외부 사용자(컨트리뷰터)도 CodeRabbit과 채팅 허용
  # - 기본값: true (GitHub org repo에서 false로 제한 가능)
  allow_non_org_members: true

  # 멘션(@coderabbitai) 없이도 자동 응답
  # - 기본값: true
  auto_reply: true

  # 이슈 트래커 연동 (채팅에서 이슈 생성 허용 여부)
  # - 값: "auto" | "enabled" | "disabled"
  #   - auto: public repo 에서는 자동 비활성화 (기본값)
  integrations:
    jira:
      usage: "auto"
    linear:
      usage: "auto"


# ============================================================
# knowledge_base: 조직 지식/컨텍스트 소스 설정
# ============================================================
knowledge_base:
  # 데이터 보존이 필요한 KB 기능을 전부 끔 (저장된 KB 데이터도 삭제됨)
  # - 기본값: false
  opt_out: false

  # 리뷰 시 웹 검색으로 외부 컨텍스트 보강
  web_search:
    # - 기본값: true
    enabled: true

  # 저장된 코딩 가이드 문서를 리뷰 기준으로 사용
  code_guidelines:
    # - 기본값: true
    enabled: true
    # 코딩 가이드가 적힌 문서 glob 패턴들
    # - 기본값: [] (기본 탐색 대상: **/CLAUDE.md, **/AGENTS.md, **/.cursor/rules/*, **/.cursorrules, .github/copilot-instructions.md 등)
    # - 예시: ["docs/coding-guideline.md", "CLAUDE.md"]
    filePatterns: []

  # 이전 리뷰에서 축적된 "learnings" 범위
  # - "local" : 현 저장소만
  # - "global": 조직 전체
  # - "auto"  : public은 local, private은 global (기본값)
  learnings:
    scope: "auto"

  # GitHub/GitLab 이슈를 컨텍스트로 사용할 범위
  issues:
    scope: "auto"  # local | global | auto

  # Jira를 지식 소스로 사용
  jira:
    usage: "auto"        # auto | enabled | disabled (기본값: auto)
    project_keys: []     # 예: ["BE", "PLAT"]

  # Linear를 지식 소스로 사용
  linear:
    usage: "auto"
    team_keys: []        # 예: ["ENG"]

  # 다른 PR을 컨텍스트로 사용할 범위
  pull_requests:
    scope: "auto"

  # MCP 서버 연동 (지식 소스로 사용)
  mcp:
    usage: "auto"
    disabled_servers: [] # 제외할 MCP 서버 레이블

  # 이 레포 리뷰 시 같이 참고할 다른 레포 (최대 10개)
  # - 기본값: []
  # - 예시:
  #   linked_repositories:
  #     - repository: "peopleground/sagwim-fe"
  #       instructions: "프론트엔드 저장소. 이 BE의 API 스펙과 연동됨."
  linked_repositories: []


# ============================================================
# code_generation: docstring/테스트 생성 시 동작
# ============================================================
code_generation:
  docstrings:
    # 생성되는 docstring 언어
    # - 기본값: "en-US"
    # - 한국어 주석을 원하면 "ko-KR" 로 변경
    language: "ko-KR"

    # 경로별 docstring 생성 지시
    # - 기본값: []
    # - 예시:
    #   path_instructions:
    #     - path: "src/main/java/**/*.java"
    #       instructions: "Javadoc 형식으로 @param, @return, @throws 를 포함"
    path_instructions: []

  unit_tests:
    # 경로별 유닛 테스트 생성 지시
    # - 기본값: []
    # - 예시:
    #   path_instructions:
    #     - path: "src/main/java/**/*Service.java"
    #       instructions: "JUnit 5 + Mockito 기반, Given/When/Then 주석 구조로 작성"
    path_instructions: []


# ============================================================
# issue_enrichment: 이슈에 컨텍스트/플랜/라벨 자동 보강
# ============================================================
issue_enrichment:
  # 이슈에 관련 코드, 예상 해결 방법, 복잡도 등을 자동으로 분석해 추가
  auto_enrich:
    # - 기본값: false
    enabled: false

  # 이슈에 구현 플랜(체크리스트)을 생성 (early preview)
  planning:
    # - 기본값: true
    enabled: true
    auto_planning:
      # 라벨 기반 자동 플래닝
      # - 기본값: true
      enabled: true
      # 자동 플래닝을 트리거할 라벨 ('!' 접두어는 제외)
      # - 기본값: []
      # - 예시: ["feature", "!wip"]
      labels: []

  # 이슈 라벨링 제어
  labeling:
    # 이슈에 어떤 라벨을 언제 붙일지 정의
    # - 기본값: []
    # - 예시:
    #   labeling_instructions:
    #     - label: "bug"
    #       instructions: "에러/버그/장애 관련 내용이면 붙인다."
    labeling_instructions: []

    # 추천된 라벨을 이슈에 자동 적용
    # - 기본값: false
    auto_apply_labels: false
