## 운영 환경 전용 설정
spring:
  sql:
    init:
      mode: never
  flyway:
    # 운영: classpath:db/migration 에 V1만 존재 → V2(개발 시드)는 dev/ 서브폴더라 자동 차단됨
  jpa:
    properties:
      hibernate:
        format_sql: false
        show_sql: false

## p6spy 비활성화 (운영 성능 보호)
decorator:
  datasource:
    p6spy:
      enable-logging: off

## 운영 로그 레벨
logging:
  level:
    root: warn
    web: warn
    com.peopleground: info
    org.flywaydb: info
