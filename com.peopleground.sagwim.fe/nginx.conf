server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker 내장 DNS resolver — Blue-Green 배포 시 컨테이너 IP가 바뀌어도
    # Nginx가 매 요청마다 'backend' 호스트명을 재조회하도록 강제한다.
    # upstream 블록 방식은 기동 시점 IP를 고정하기 때문에 Blue 컨테이너가
    # 교체되면 죽은 IP로 계속 요청을 보내 502/연결오류가 발생한다.
    resolver 127.0.0.11 valid=5s ipv6=off;
    set $backend_host "backend:8080";

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # 파일 업로드 최대 크기 (백엔드 설정과 동일)
    client_max_body_size 20m;

    # 헬스체크 엔드포인트
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # 업로드 이미지 정적 파일 서빙 (백엔드 컨테이너 볼륨 공유)
    location /images/ {
        alias /app/uploads/images/;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # API 역방향 프록시 → 백엔드 컨테이너
    # $backend_host 변수를 사용해야 resolver가 매 요청마다 DNS를 재조회한다.
    # 변수 없이 literal 호스트명을 쓰면 upstream 블록과 동일하게 IP가 캐시된다.
    location /api/ {
        proxy_pass http://$backend_host;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Swagger UI 프록시
    location /swagger-ui/ {
        proxy_pass http://$backend_host;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /v3/api-docs {
        proxy_pass http://$backend_host;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 정적 파일 캐시 (해시 포함 빌드 산출물: 1년)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA 라우팅 (index.html fallback)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
